name: Deploy to EKS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: us-east-1
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 692859926752.dkr.ecr.us-east-1.amazonaws.com

    - name: Build image
      run: docker build -t project1:${{ github.sha }} ./app

    - name: Push image
      run: |
        docker tag project1:${{ github.sha }} 692859926752.dkr.ecr.us-east-1.amazonaws.com/project1:${{ github.sha }}
        docker push 692859926752.dkr.ecr.us-east-1.amazonaws.com/project1:${{ github.sha }}